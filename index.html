<!DOCTYPE html>
<html lang="en">

<head>
    <title>Jon's Cologne Collection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="utf-8">
</head>

<body>
    <header>
        <h1>Jon's Cologne Collection</h1>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search cologne or brand..." onkeyup="handleSearch()">
    </div>

    <div class="filters">
        <button class="filter-btn" onclick="filterFragrances('All')">All</button>
        <span class="divider">|</span>
        <button class="filter-btn" onclick="filterFragrances('Winter')">Winter</button>
        <button class="filter-btn" onclick="filterFragrances('Spring')">Spring</button>
        <button class="filter-btn" onclick="filterFragrances('Summer')">Summer</button>
        <button class="filter-btn" onclick="filterFragrances('Fall')">Fall</button>
        <span class="divider">|</span> <button class="filter-btn" onclick="filterFragrances('Day')">Day</button>
        <button class="filter-btn" onclick="filterFragrances('Night')">Night</button>
    </div>

    <div class="gallery" id="gallery"></div>
    <script src="fragrances.js"></script>
    <script>
        const gallery = document.getElementById("gallery");
        function displayFragrances(data) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = ''; 

            data.forEach(fragrance => {
                const card = document.createElement('div');
                card.className = 'card';

                // Helper function to create badges
                const createBadges = (items) => {
                    return items.map(item => 
                        `<span class="badge ${item.status.toLowerCase()}">${item.name}</span>`
                    ).join('');
                };

                card.innerHTML = `
                    <img src="${fragrance.image || 'placeholder.jpg'}" alt="${fragrance.name}">
                    <h3>${fragrance.brand}</h3>
                    <h4>${fragrance.name}</h4>
                    
                    <div class="badge-container">
                        ${createBadges(fragrance.season)}
                    </div>
                    <div class="badge-container">
                        ${createBadges(fragrance.time)}
                    </div>

                    <div class="notes">
                        <p><strong>Top:</strong> ${fragrance.top}</p>
                        <p><strong>Middle:</strong> ${fragrance.middle}</p>
                        <p><strong>Base:</strong> ${fragrance.base}</p>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        displayFragrances(fragrances);

        let activeFilters = [];

        // Define which button belongs to which category
        const categories = {
            'Winter': 'season', 'Spring': 'season', 'Summer': 'season', 'Fall': 'season',
            'Day': 'time', 'Night': 'time'
        };

        function filterFragrances(filter) {
            const buttons = document.querySelectorAll('.filter-btn');
            
            if (filter === "All") {
                activeFilters = [];
            } else {
                const category = categories[filter];

                if (activeFilters.includes(filter)) {
                    // If already active, toggle it off
                    activeFilters = activeFilters.filter(f => f !== filter);
                } else {
                    // Remove any existing filter from the SAME category before adding the new one
                    activeFilters = activeFilters.filter(f => categories[f] !== category);
                    activeFilters.push(filter);
                }
            }

            // Update button colors (CSS class)
            buttons.forEach(btn => {
                const btnText = btn.textContent.trim();
                if (activeFilters.includes(btnText)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Filtering Logic
            let filtered = fragrances;
            if (activeFilters.length > 0) {
                filtered = fragrances.filter(f => {
                    // Must be 'good' or 'ok' for EVERY active filter
                    return activeFilters.every(filterName => {
                        const match = [...f.season, ...f.time].find(i => i.name === filterName);
                        return match && (match.status === "good" || match.status === "ok");
                    });
                });

                // Sorting: Priority to 'good' status based on the first selected filter
                const primary = activeFilters[0];
                filtered.sort((a, b) => {
                    const statusA = [...a.season, ...a.time].find(i => i.name === primary)?.status;
                    const statusB = [...b.season, ...b.time].find(i => i.name === primary)?.status;
                    if (statusA === "good" && statusB === "ok") return -1;
                    if (statusA === "ok" && statusB === "good") return 1;
                    return 0;
                });
            }

            displayFragrances(filtered);
        }

        function handleSearch() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();

        // 1. First, apply your existing activeFilters logic
        let filtered = fragrances;

        if (activeFilters.length > 0) {
            filtered = fragrances.filter(f => {
                return activeFilters.every(filterName => {
                    const match = [...f.season, ...f.time].find(i => i.name === filterName);
                    return match && (match.status === "good" || match.status === "ok");
                });
            });
        }

        // 2. Then, filter further by the search term (Brand or Name)
        const searched = filtered.filter(f => 
            f.name.toLowerCase().includes(searchTerm) || 
            f.brand.toLowerCase().includes(searchTerm)
        );

        displayFragrances(searched);
        }

    </script>

    <footer>
        Copyright © 2026 Melissa Weller
    </footer>
</body>
</html>
