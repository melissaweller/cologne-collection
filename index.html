<!DOCTYPE html>
<html lang="en">

<head>
    <title>Jon's Cologne Collection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="utf-8">
</head>

<body>
    <header>
        <h1>Jon's Cologne Collection</h1>
    </header>

    <div class="filters">
        <button onclick="filterFragrances('All')">All</button>
        <button onclick="filterFragrances('Winter')">Winter</button>
        <button onclick="filterFragrances('Spring')">Spring</button>
        <button onclick="filterFragrances('Summer')">Summer</button>
        <button onclick="filterFragrances('Fall')">Fall</button>
        <button onclick="filterFragrances('Day')">Day</button>
        <button onclick="filterFragrances('Night')">Night</button>
    </div>

    <div class="gallery" id="gallery"></div>
    <script src="fragrances.js"></script>
    <script>
        const gallery = document.getElementById("gallery");
        function displayFragrances(list){
            gallery.innerHTML = "";

            list.forEach(f => {

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <img src="${f.image}" alt="${f.name}">

                <div class="name">${f.name}</div>
                <div class="brand">${f.brand}</div>

                <div class="tags">${f.season.join(" • ")}</div>
                <div class="tags">${f.time.join(" / ")}</div>

                <div class="notes">
                <b>Top:</b> ${f.top}<br>
                <b>Middle:</b> ${f.middle}<br>
                <b>Base:</b> ${f.base}
                </div>`;
                
            gallery.appendChild(card);
            });
        }

        displayFragrances(fragrances);

        function filterFragrances(filter){

        if(filter === "All"){
            displayFragrances(fragrances);
        return;}

        const filtered = fragrances.filter(f =>
        f.season.includes(filter) || f.time.includes(filter)
        );

        displayFragrances(filtered);
        }
    </script>

    <footer>
        Copyright © 2026 Melissa Weller
    </footer>
</body>
</html>
